[package]
name = "macros"
version = "0.1.0"
edition = "2024"

[dependencies]
once_cell = "1.21.3"
tracing = "0.1.41"
tracing-log = "0.2.0"
tracing-subscriber = "0.3.19"
serde = { version = "1.0.219", features = ["derive"] }
enigo = { version = "0.3.0", features = ["serde", "x11rb"] }
slotmap = { version = "1.0.7", features = ["serde"] }

[dependencies.libcosmic]
git = "https://github.com/pop-os/libcosmic.git"
rev = "c8c650c"
version = "0.1.0"
default-features = false
features = [
    "debug",
    "winit",
    "tokio",
    "xdg-portal",
    "dbus-config",
    "a11y",
    "wayland",
    "wgpu",
    "single-instance",
    "multi-window",
    "serde-keycode"
]

[build-dependencies]
