[package]
name = "macros"
version = "0.1.0"
edition = "2021"

[dependencies]
tracing = "0.1.41"
tracing-log = "0.2.0"
tracing-subscriber = "0.3.19"
serde = { version = "1.0.217", features = ["derive"] }
enigo = { version = "0.3.0", features = ["serde"] }

[dependencies.libcosmic]
git = "https://github.com/pop-os/libcosmic.git"
rev = "b2ce4cc"
version = "0.1.0"
default-features = false
features = [
    "debug",
    "winit",
    "tokio",
    "xdg-portal",
    "dbus-config",
    "a11y",
    "wayland",
    "wgpu",
    "single-instance",
    "multi-window",
    "serde-keycode"
]

[build-dependencies]
